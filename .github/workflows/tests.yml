name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Run tests
      env:
        SMU_BLUEPRINT: owner/repo
        SMU_BLUEPRINT_BRANCH: main
      run: |
        python -m unittest discover -s . -v
    
    - name: Run tests with pytest (if available)
      env:
        SMU_BLUEPRINT: owner/repo
        SMU_BLUEPRINT_BRANCH: main
      run: |
        pip install pytest 2>/dev/null || true
        pytest test_smu.py -v 2>/dev/null || python -m unittest test_smu -v